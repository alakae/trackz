version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

    groups:
      # Major bump groups — coordinate packages that must move together
      eslint-major:
        applies-to: version-updates
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
        update-types: ["major"]

      vite-major:
        applies-to: version-updates
        patterns:
          - "vite"
          - "@vitejs/*"
          - "rollup"
        update-types: ["major"]

      react-major:
        applies-to: version-updates
        patterns:
          - "react*"
          - "@types/react*"
        update-types: ["major"]

      # Minor groups — broad catch-all by dependency type
      production-dependencies:
        applies-to: version-updates
        dependency-type: "production"
        update-types: ["minor"]

      dev-dependencies:
        applies-to: version-updates
        dependency-type: "development"
        update-types: ["minor"]

    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    cooldown:
      default-days: 7
